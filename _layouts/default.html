<!DOCTYPE html>
<html>
  <head>
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  </head>
  <body>
    <header>
      <h1>{{ site.title }}</h1>
      <nav>
        <a href="{{ '/' | relative_url }}" class="nav-btn">Home</a>
        <a href="{{ '/about' | relative_url }}" class="nav-btn">About</a>
        <a href="{{ '/projects' | relative_url }}" class="nav-btn">Projects</a>
        <a href="{{ '/coursework' | relative_url }}" class="nav-btn">Coursework</a>
        <a href="{{ '/contact' | relative_url }}" class="nav-btn">Contact</a>
        <a href="https://linkedin.com/in/YOUR-USERNAME" target="_blank" class="nav-btn linkedin-btn"><i class="fab fa-linkedin"></i></a>
      </nav>
    </header>

    {{ content }}

    <footer>
      <p>&copy; 2026 {{ site.author }}</p>
    </footer>
  </body>
</html>
